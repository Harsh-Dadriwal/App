services:
  # ─── NestJS Backend API ───────────────────────────────────────────────
  - type: web
    name: mahalaxmi-api
    runtime: node
    region: singapore  # Closest to India

    # Root of the monorepo
    rootDir: .

    # Build: install all workspace deps, then build the API
    buildCommand: npm install && npm --prefix apps/api run build

    # Start the compiled NestJS app
    startCommand: node apps/api/dist/apps/api/src/main.js

    # Health check – NestJS exposes /health
    healthCheckPath: /health

    # Auto-deploy when you push to main branch
    branch: main
    autoDeploy: true

    # Render injects PORT automatically; NestJS reads it in main.ts
    envVars:
      - key: NODE_ENV
        value: production

      # ── Supabase ──────────────────────────────────────────────────────
      - key: SUPABASE_URL
        value: https://ntxvfpiubgnjemczaphy.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false          # Set this in the Render dashboard (secret)
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false          # Set this in the Render dashboard (secret)

      # ── Razorpay ──────────────────────────────────────────────────────
      - key: RAZORPAY_KEY_ID
        sync: false          # Set this in the Render dashboard (secret)
      - key: RAZORPAY_KEY_SECRET
        sync: false          # Set this in the Render dashboard (secret)

      # ── Cloudflare R2 ─────────────────────────────────────────────────
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: product-image-store
      - key: R2_PUBLIC_BASE_URL
        sync: false

      # ── AWS S3 (legacy) ───────────────────────────────────────────────
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        value: photo-product-bucket

      # ── Redis (from the addon below) ──────────────────────────────────
      - key: REDIS_URL
        fromService:
          type: redis
          name: mahalaxmi-redis
          property: connectionString

  # ─── Redis (BullMQ queue backend) ────────────────────────────────────
  - type: redis
    name: mahalaxmi-redis
    region: singapore
    plan: free
    maxmemoryPolicy: noeviction
